name: Generar y desplegar dashboard

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto
  workflow_dispatch:        # ejecutable a mano desde GitHub

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generar dashboard
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: python3 dashboard_ado.py

      - name: Commitear HTML actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard actualizado $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
